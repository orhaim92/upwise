<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UpWise · אין חיבור</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      text-align: center;
    }
    .logo {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(to left, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 32px;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: #64748b; max-width: 360px; }
    button {
      margin-top: 24px;
      background: #7c3aed;
      color: white;
      border: 0;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="logo">UpWise</div>
  <h1>אין חיבור לאינטרנט</h1>
  <p>חלק מהעמודים זמינים גם ללא חיבור. נסה ללכת לדשבורד או רענן כשתחזור לרשת.</p>
  <button onclick="location.href='/dashboard'">לדשבורד</button>
</body>
</html>
